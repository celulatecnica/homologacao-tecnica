<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisador de Comando</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 30px auto;
        padding: 20px;
        background: #f4f4f4;
    }

    h1 {
        color: #333;
    }

    textarea {
        width: 100%;
        padding: 10px;
        font-family: Consolas, monospace;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
    }

    #comando {
        height: 250px;
    }

    #resultado {
        height: 250px;
        margin-top: 20px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: #0078d7;
        color: white;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background: #005fa3;
    }
</style>
</head>

<body>

<h1>Analisador de String</h1>

<textarea id="comando" placeholder="Cole a string aqui..."></textarea>

<br>

<button type="button" onclick="analisar()">Analisar</button>

<textarea id="resultado" readonly placeholder="O resultado aparecerá aqui..."></textarea>

<script>
function analisar() {
    const campoComando = document.getElementById("comando");
    const campoResultado = document.getElementById("resultado");

    let texto = campoComando.value
        .replace(/\s/g, "")
        .trim()
        .toUpperCase();

    if (texto === "") {
        campoResultado.value = "Informe uma string para analisar.";
        return;
    }

    const posAA = texto.indexOf("AA");

    if (posAA === -1) {
        campoResultado.value = "Nenhuma sequência AA foi encontrada.";
        return;
    }

    /*
        Exemplo:
        ...A00A100000000AA039C...

        A primeira sequência AA está aqui:
                         AA

        O primeiro bloco precisa começar 13 caracteres antes
        do primeiro A desse AA:

        A00A100000000A

        Depois os próximos blocos seguem de 14 em 14 caracteres.
    */
    let posicao = posAA - 13;

    if (posicao < 0) {
        campoResultado.value = "Não existem 13 caracteres antes da primeira sequência AA.";
        return;
    }

    let blocos = [];

    while (posicao + 14 <= texto.length) {
        const bloco = texto.substring(posicao, posicao + 14);

        if (bloco.length !== 14) {
            break;
        }

        if (!bloco.endsWith("A")) {
            break;
        }

        blocos.push(bloco);

        /*
            Avança exatamente 14 caracteres,
            conforme a regra solicitada.
        */
        posicao += 14;
    }

    if (blocos.length === 0) {
        campoResultado.value = "Nenhum bloco válido foi encontrado.";
        return;
    }

    /*
        Resultado separado por espaço.
        Exemplo:
        A00A100000000A A039C00000000A A039100000000A
    */
    campoResultado.value = blocos.join(" ");
}
</script>

</body>
</html>
