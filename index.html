<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisador de Comando</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 30px auto;
        padding: 20px;
        background: #f4f4f4;
    }

    h1 {
        color: #333;
    }

    textarea {
        width: 100%;
        padding: 10px;
        font-family: Consolas, monospace;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
    }

    #comando {
        height: 250px;
    }

    #resultado {
        height: 450px;
        margin-top: 20px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: #0078d7;
        color: white;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background: #005fa3;
    }
</style>
</head>

<body>

<h1>Analisador de String</h1>

<textarea id="comando" placeholder="Cole a string aqui..."></textarea>

<br>

<button type="button" onclick="analisar()">Analisar</button>

<textarea id="resultado" readonly placeholder="O resultado aparecerá aqui..."></textarea>

<script>
function analisar() {
    const textoOriginal = document.getElementById("comando").value;
    const resultado = document.getElementById("resultado");

    const texto = textoOriginal
        .replace(/\s/g, "")
        .trim()
        .toUpperCase();

    if (texto === "") {
        resultado.value = "Informe uma string para analisar.";
        return;
    }

    const posAA = texto.indexOf("AA");

    if (posAA === -1) {
        resultado.value = "Nenhuma sequência AA foi encontrada.";
        return;
    }

    let posicaoInicial = posAA - 13;

    if (posicaoInicial < 0) {
        resultado.value = "Não existem 13 caracteres antes da primeira sequência AA encontrada.";
        return;
    }

    let posicao = posicaoInicial;
    let linhas = [];

    while (posicao + 14 <= texto.length) {
        const bloco = texto.substring(posicao, posicao + 14);

        if (bloco.length < 14) {
            break;
        }

        if (!bloco.startsWith("A")) {
            break;
        }

        if (!bloco.endsWith("A")) {
            break;
        }

        linhas.push(bloco);

        posicao += 13;
    }

    if (linhas.length === 0) {
        resultado.value = "Nenhum agrupamento válido foi encontrado.";
        return;
    }

    resultado.value = linhas.join("\n");
}
</script>

</body>
</html>
