<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisador de Comando</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 30px auto;
        padding: 20px;
        background: #f4f4f4;
    }

    h1 {
        color: #333;
    }

    textarea {
        width: 100%;
        padding: 10px;
        font-family: Consolas, monospace;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
    }

    #comando {
        height: 250px;
    }

    #resultado {
        height: 350px;
        margin-top: 20px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: #0078d7;
        color: white;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background: #005fa3;
    }
</style>
</head>

<body>

<h1>Analisador de String</h1>

<textarea id="comando" placeholder="Cole a string aqui..."></textarea>

<br>

<button type="button" onclick="analisar()">Analisar</button>

<textarea id="resultado" readonly placeholder="O resultado aparecerá aqui..."></textarea>

<script>
function analisar() {
    const campoComando = document.getElementById("comando");
    const campoResultado = document.getElementById("resultado");

    let texto = campoComando.value
        .replace(/\s/g, "")
        .trim()
        .toUpperCase();

    if (texto === "") {
        campoResultado.value = "Informe uma string para analisar.";
        return;
    }

    const posAA = texto.indexOf("AA");

    if (posAA === -1) {
        campoResultado.value = "Nenhuma sequência AA foi encontrada.";
        return;
    }

    /*
        Localiza a primeira sequência AA.
        Volta 13 caracteres para formar o primeiro bloco.
        Exemplo:
        A00A100000000A
    */
    let posicao = posAA - 13;

    if (posicao < 0) {
        campoResultado.value = "Não existem 13 caracteres antes da primeira sequência AA.";
        return;
    }

    let resultados = [];

    while (posicao + 14 <= texto.length) {
        const bloco = texto.substring(posicao, posicao + 14);

        if (bloco.length !== 14) {
            break;
        }

        if (!bloco.endsWith("A")) {
            break;
        }

        /*
            Pega os 4 primeiros dígitos após o A.
            Exemplo:
            A00A100000000A
             ^^^^
             00A1
        */
        const hexadecimal = bloco.substring(1, 5);

        /*
            Converte hexadecimal para decimal.
            Equivalente ao HEXADEC do Excel.
        */
        const decimal = parseInt(hexadecimal, 16);

        resultados.push(bloco + " = " + decimal);

        /*
            Avança de 14 em 14 caracteres.
        */
        posicao += 14;
    }

    if (resultados.length === 0) {
        campoResultado.value = "Nenhum bloco válido foi encontrado.";
        return;
    }

    campoResultado.value = resultados.join("\n");
}
</script>

</body>
</html>
